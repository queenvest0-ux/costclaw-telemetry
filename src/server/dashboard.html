<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CostClaw — LLM Cost Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
    header h1 span { color: #f97316; }
    .badge {
      font-size: 0.7rem;
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 3px 8px;
      border-radius: 99px;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 20px;
    }
    .card-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .card-value { font-size: 1.8rem; font-weight: 700; color: #f1f5f9; }
    .card-value.money { color: #34d399; }
    .card-value.warning { color: #f97316; }

    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    @media (max-width: 700px) { .charts { grid-template-columns: 1fr; } }
    .chart-box {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 20px;
    }
    .chart-title { font-size: 0.85rem; font-weight: 600; color: #94a3b8; margin-bottom: 16px; }
    canvas { max-height: 220px; }

    .section {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .section-title { font-size: 0.85rem; font-weight: 600; color: #94a3b8; margin-bottom: 16px; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; color: #64748b; font-weight: 500; padding: 6px 12px 10px; font-size: 0.75rem; text-transform: uppercase; }
    td { padding: 8px 12px; border-top: 1px solid #1e2436; color: #cbd5e1; }
    tr:hover td { background: #1e2436; }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8rem; }
    .cost { color: #34d399; font-weight: 600; }
    .tag {
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .tag-high   { background: #7f1d1d; color: #fca5a5; }
    .tag-medium { background: #78350f; color: #fcd34d; }
    .tag-low    { background: #1e3a5f; color: #93c5fd; }

    .rec {
      padding: 14px 16px;
      border-left: 3px solid #f97316;
      background: #1e1f2e;
      border-radius: 0 8px 8px 0;
      margin-bottom: 10px;
    }
    .rec-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
    .rec-desc { font-size: 0.82rem; color: #94a3b8; line-height: 1.5; }
    .rec-savings { font-size: 0.78rem; color: #34d399; margin-top: 6px; font-weight: 600; }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-dot.inactive { background: #ef4444; animation: none; }

    footer {
      text-align: center;
      color: #334155;
      font-size: 0.75rem;
      padding: 24px;
    }
    #last-updated { color: #475569; font-size: 0.75rem; }
    .empty { color: #475569; font-style: italic; font-size: 0.85rem; padding: 12px 0; }
  </style>
</head>
<body>

<header>
  <h1>🦞 Cost<span>Claw</span></h1>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="last-updated"></span>
    <span class="badge"><span class="status-dot" id="status-dot"></span>Live</span>
  </div>
</header>

<div class="container">

  <!-- Summary Cards -->
  <div class="cards">
    <div class="card">
      <div class="card-label">Today</div>
      <div class="card-value money" id="card-today">$0.00</div>
    </div>
    <div class="card">
      <div class="card-label">This Month</div>
      <div class="card-value money" id="card-month">$0.00</div>
    </div>
    <div class="card">
      <div class="card-label">Models Used</div>
      <div class="card-value" id="card-models">0</div>
    </div>
    <div class="card">
      <div class="card-label">Sessions</div>
      <div class="card-value" id="card-sessions">0</div>
    </div>
    <div class="card">
      <div class="card-label">Total Events</div>
      <div class="card-value" id="card-events">0</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts">
    <div class="chart-box">
      <div class="chart-title">7-Day Spend Trend</div>
      <canvas id="trendChart"></canvas>
    </div>
    <div class="chart-box">
      <div class="chart-title">Model Breakdown (This Month)</div>
      <canvas id="modelChart"></canvas>
    </div>
  </div>

  <!-- Per-Session Costs -->
  <div class="section">
    <div class="section-title">Sessions by Cost</div>
    <div id="sessions-body">
      <div class="empty">No session data yet.</div>
    </div>
  </div>

  <!-- Recommendations -->
  <div class="section">
    <div class="section-title">Cost-Saving Recommendations</div>
    <div id="recs-body">
      <div class="empty">Collecting data…</div>
    </div>
  </div>

</div>

<footer>CostClaw MVP — local-only, privacy-first &nbsp;|&nbsp; Data stays on your machine</footer>

<script>
const fmt = (n) => '$' + (n || 0).toFixed(2);
const fmtDate = (d) => new Date(d).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
const fmtTs = (ms) => ms ? new Date(ms).toLocaleString() : '—';
const truncate = (s, n) => s && s.length > n ? s.slice(0, n) + '…' : (s || 'unknown');

let trendChart, modelChart;

function initCharts() {
  const baseOpts = {
    responsive: true,
    maintainAspectRatio: true,
    plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } },
  };

  trendChart = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'USD', data: [], borderColor: '#f97316', backgroundColor: 'rgba(249,115,22,0.1)', fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#f97316' }] },
    options: { ...baseOpts, scales: { x: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } }, y: { ticks: { color: '#64748b', callback: v => '$' + v.toFixed(3) }, grid: { color: '#1e293b' } } }, plugins: { ...baseOpts.plugins, legend: { display: false } } },
  });

  modelChart = new Chart(document.getElementById('modelChart'), {
    type: 'doughnut',
    data: { labels: [], datasets: [{ data: [], backgroundColor: ['#f97316','#3b82f6','#22c55e','#a855f7','#14b8a6','#f59e0b','#ec4899','#64748b'] }] },
    options: { ...baseOpts, plugins: { ...baseOpts.plugins, legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 10 }, boxWidth: 12 } } } },
  });
}

async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    return r.ok ? r.json() : null;
  } catch { return null; }
}

function shortModel(m) {
  return m.replace('claude-3-5-', 'c3.5-').replace('claude-3-', 'c3-').replace('-20241022','').replace('-20240229','').replace('-20240307','').replace('-20240620','');
}

async function refresh() {
  const [summary, trend, models, sessions, recs, health] = await Promise.all([
    fetchJSON('/api/summary'),
    fetchJSON('/api/trend'),
    fetchJSON('/api/models'),
    fetchJSON('/api/sessions'),
    fetchJSON('/api/recommendations'),
    fetchJSON('/api/health'),
  ]);

  if (!summary) return;

  // Cards
  document.getElementById('card-today').textContent = fmt(summary.todayUsd);
  document.getElementById('card-month').textContent = fmt(summary.monthUsd);
  document.getElementById('card-models').textContent = summary.modelCount;
  document.getElementById('card-sessions').textContent = summary.sessionCount;
  document.getElementById('card-events').textContent = summary.totalEvents.toLocaleString();

  // Status dot
  const dot = document.getElementById('status-dot');
  if (health?.watcherActive) { dot.classList.remove('inactive'); } else { dot.classList.add('inactive'); }
  document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

  // Trend chart
  if (trend && trend.length > 0) {
    trendChart.data.labels = trend.map(d => fmtDate(d.date));
    trendChart.data.datasets[0].data = trend.map(d => d.costUsd);
    trendChart.update('none');
  }

  // Model chart
  if (models && models.length > 0) {
    modelChart.data.labels = models.map(m => shortModel(m.model));
    modelChart.data.datasets[0].data = models.map(m => m.costUsd);
    modelChart.update('none');
  }

  // Sessions table
  const sessEl = document.getElementById('sessions-body');
  if (sessions && sessions.length > 0) {
    sessEl.innerHTML = `<table>
      <thead><tr><th>Session</th><th>Cost</th><th>Events</th><th>Started</th><th>Last Active</th></tr></thead>
      <tbody>${sessions.map(s => `<tr>
        <td class="mono">${truncate(s.sessionKey, 28)}</td>
        <td class="cost">${fmt(s.costUsd)}</td>
        <td>${s.eventCount}</td>
        <td style="color:#64748b;font-size:0.8rem">${fmtTs(s.startTs)}</td>
        <td style="color:#64748b;font-size:0.8rem">${fmtTs(s.endTs)}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  } else {
    sessEl.innerHTML = '<div class="empty">No session data yet. Run some agents!</div>';
  }

  // Recommendations
  const recsEl = document.getElementById('recs-body');
  if (recs && recs.length > 0) {
    recsEl.innerHTML = recs.map(r => `
      <div class="rec">
        <div class="rec-title">${r.title}
          <span class="tag tag-${r.confidence}" style="margin-left:8px">${r.confidence}</span>
        </div>
        <div class="rec-desc">${r.description}</div>
        ${r.estimatedSavingsUsd != null ? `<div class="rec-savings">Estimated savings: ${fmt(r.estimatedSavingsUsd)}/month</div>` : ''}
      </div>`).join('');
  } else {
    recsEl.innerHTML = '<div class="empty">No recommendations yet — keep running agents!</div>';
  }
}

initCharts();
refresh();
setInterval(refresh, 10_000);
</script>
</body>
</html>
